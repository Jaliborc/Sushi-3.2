name: Tag Library Version

on:
  push:
    branches:
      - master
  workflow_dispatch: # This enables manual triggering

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all tags and history

      - name: Extract Version
        id: get_version
        run: |
          # Find the file
          FILE_PATH=$(grep -rl "LibStub:NewLibrary" --include="*.lua" . | head -n 1)

          if [ -z "$FILE_PATH" ]; then
            echo "Error: Could not find LibStub:NewLibrary"
            exit 1
          fi

          # The Regex Explanation:
          # 1. Look for '-' followed by numbers/dots: ([0-9.]+)
          # 2. Skip the middle man: .*
          # 3. Look for the comma and the final number: ,[[:space:]]*([0-9.]+)
          LINE=$(grep "LibStub:NewLibrary" "$FILE_PATH")
          MAJOR_MINOR=$(echo "$LINE" | sed -E 's/.*-([0-9.]+).*/\1/')

          echo "Detected Version: $MAJOR_MINOR"
          echo "version=$MAJOR_MINOR" >> $GITHUB_OUTPUT

      - name: Find Next Tag
        id: tag_checker
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          
          # Initialize
          FINAL_TAG="$VERSION"
          COUNTER=1

          # Check for existence and increment if necessary
          # Note: 'git rev-parse' checks local; 'git ls-remote' checks the server directly
          while git rev-parse "$FINAL_TAG" >/dev/null 2>&1; do
            FINAL_TAG="${VERSION}.${COUNTER}"
            COUNTER=$((COUNTER + 1))
          done

          echo "Found available tag: $FINAL_TAG"
          # Set the output for the next step
          echo "tag=$FINAL_TAG" >> $GITHUB_OUTPUT

      - name: Create and Push Tag
        run: |
          TAG_NAME="${{ steps.tag_checker.outputs.tag }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "Tagging commit with: $TAG_NAME"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"